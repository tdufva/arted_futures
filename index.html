<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Utopiointi</title>
    <style>
      :root {
        --page-bg: #ffe38a;
        --panel-bg: rgba(255, 248, 214, 0.78);
        --panel-border: rgba(205, 20, 200, 0.28);
        --shadow: 0 18px 40px rgba(119, 73, 20, 0.14);
        --button-bg: rgb(250, 150, 220);
        --button-text: rgb(255, 255, 220);
        --button-border: rgb(205, 20, 200);
        --link: #7b295d;
        --note-bg: rgba(250, 241, 224, 0.88);
        --note-border: rgba(121, 73, 86, 0.25);
        --note-text: #4f3d31;
        --note-placeholder: rgba(79, 61, 49, 0.65);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.42), transparent 30%),
          linear-gradient(180deg, #ffe689 0%, #ffd565 100%);
        color: #3a2d14;
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
        overscroll-behavior-y: none;
      }

      .app-shell {
        min-height: 100dvh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding:
          max(16px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
      }

      .app-frame {
        width: min(1180px, 100%);
        display: grid;
        grid-template-rows: auto minmax(320px, 1fr) auto;
        gap: 16px;
      }

      .top-controls,
      .bottom-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .language-controls,
      .action-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .prompt-link {
        display: inline-flex;
        align-items: center;
        color: var(--link);
        font-size: 0.95rem;
        line-height: 1.4;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.16em;
        min-height: 44px;
      }

      .canvas-shell {
        position: relative;
        min-height: 320px;
        background: rgba(255, 248, 214, 0.34);
        border: 1px solid rgba(205, 20, 200, 0.2);
        border-radius: 30px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .prompt-canvas {
        display: block;
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        z-index: 0;
      }

      .writing-panel {
        position: absolute;
        left: clamp(12px, 3vw, 26px);
        right: clamp(12px, 3vw, 26px);
        bottom: clamp(12px, 3vw, 26px);
        z-index: 2;
        display: grid;
        gap: 10px;
        padding: 14px 16px 16px;
        background: var(--note-bg);
        border: 1px solid var(--note-border);
        border-radius: 22px;
        box-shadow: 0 14px 28px rgba(90, 56, 39, 0.12);
        backdrop-filter: blur(10px);
      }

      .writing-label {
        color: #6f4654;
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .writing-input {
        width: 100%;
        min-height: 112px;
        resize: vertical;
        padding: 14px 16px;
        border: 1px solid rgba(121, 73, 86, 0.22);
        border-radius: 16px;
        background: rgba(255, 252, 245, 0.72);
        color: var(--note-text);
        font-family: "Prestige Elite Std", "Courier New", monospace;
        font-size: 1rem;
        line-height: 1.55;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .writing-input::placeholder {
        color: var(--note-placeholder);
      }

      .writing-input:focus {
        outline: none;
        border-color: rgba(121, 73, 86, 0.5);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          0 0 0 3px rgba(226, 168, 169, 0.22);
      }

      .control-button {
        appearance: none;
        min-height: 44px;
        padding: 0 18px;
        border: 2px solid var(--button-border);
        border-radius: 999px;
        background: var(--button-bg);
        color: var(--button-text);
        cursor: pointer;
        letter-spacing: 0.03em;
        box-shadow: 0 8px 18px rgba(205, 20, 200, 0.16);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          filter 140ms ease;
      }

      .control-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(205, 20, 200, 0.22);
      }

      .control-button:active {
        transform: translateY(0);
      }

      .control-button-small {
        min-width: 56px;
      }

      .control-button-primary {
        font-weight: 700;
      }

      @media (hover: none) and (pointer: coarse) {
        .app-shell {
          padding:
            max(14px, env(safe-area-inset-top))
            max(14px, env(safe-area-inset-right))
            max(18px, env(safe-area-inset-bottom))
            max(14px, env(safe-area-inset-left));
        }

        .top-controls,
        .bottom-controls {
          gap: 14px;
          padding: 14px;
        }

        .language-controls,
        .action-controls {
          width: 100%;
          gap: 12px;
          justify-content: center;
        }

        .prompt-link {
          width: 100%;
          justify-content: center;
          text-align: center;
        }

        .control-button {
          min-height: 50px;
        }

        .control-button:hover {
          transform: none;
          box-shadow: 0 8px 18px rgba(205, 20, 200, 0.16);
        }
      }

      @media (max-width: 720px) {
        .app-frame {
          grid-template-rows: auto minmax(58dvh, 1fr) auto;
          gap: 14px;
        }

        .top-controls,
        .bottom-controls {
          border-radius: 18px;
          padding: 12px;
        }

        .top-controls,
        .bottom-controls,
        .language-controls,
        .action-controls {
          justify-content: center;
        }

        .prompt-link {
          width: 100%;
          text-align: center;
          font-size: 0.9rem;
        }

        .canvas-shell {
          min-height: 52dvh;
          border-radius: 24px;
        }

        .writing-panel {
          border-radius: 18px;
          padding: 12px;
        }

        .control-button {
          width: 100%;
          padding: 0 20px;
        }

        .control-button-small {
          width: calc(33.333% - 8px);
          min-width: 0;
        }
      }

      @media (max-width: 520px) {
        .app-shell {
          padding:
            max(10px, env(safe-area-inset-top))
            max(10px, env(safe-area-inset-right))
            max(16px, env(safe-area-inset-bottom))
            max(10px, env(safe-area-inset-left));
        }

        .top-controls,
        .bottom-controls {
          padding: 10px;
        }

        .canvas-shell {
          min-height: 56dvh;
          border-radius: 20px;
        }

        .writing-input {
          min-height: 104px;
          padding: 12px 14px;
          font-size: 0.96rem;
        }

        .prompt-link {
          font-size: 0.86rem;
        }

        .control-button {
          min-height: 52px;
          font-size: 16px;
        }
      }

      @media (max-width: 720px) and (orientation: landscape) {
        .app-frame {
          grid-template-columns: minmax(0, 1fr) minmax(280px, 34vw);
          grid-template-rows: auto 1fr;
          align-items: stretch;
        }

        .top-controls {
          grid-column: 1 / -1;
        }

        .canvas-shell {
          min-height: 68dvh;
        }

        .writing-panel {
          left: 14px;
          right: 14px;
          bottom: 14px;
        }

        .bottom-controls {
          align-content: start;
          justify-content: center;
        }

        .action-controls {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <main id="app-shell" class="app-shell">
      <section class="app-frame">
        <header id="top-controls" class="top-controls">
          <div id="language-controls" class="language-controls"></div>
        </header>
        <section id="canvas-shell" class="canvas-shell">
          <div class="writing-panel">
            <label id="writing-label" class="writing-label" for="writing-input">WRITE YOUR OWN FUTURE NOTE</label>
            <textarea
              id="writing-input"
              class="writing-input"
              placeholder="Continue the future here..."
            ></textarea>
          </div>
        </section>
        <footer class="bottom-controls">
          <div id="action-controls" class="action-controls"></div>
        </footer>
      </section>
    </main>
    <script src="utopiointi.js"></script>
  </body>
</html>
